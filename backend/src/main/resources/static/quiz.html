<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗词问答 - 诗韵雅集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 30px 0;
            color: #2c3e50;
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { color: #7f8c8d; }
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 30px;
        }
        .nav-btn {
            padding: 10px 20px;
            background: white;
            border: 2px solid #3498db;
            color: #3498db;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .nav-btn:hover, .nav-btn.active {
            background: #3498db;
            color: white;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 30px;
            margin-bottom: 20px;
        }
        .quiz-settings {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .quiz-settings label { font-weight: 600; }
        .quiz-settings select, .quiz-settings input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }
        .btn-primary {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.2s;
        }
        .btn-primary:hover { transform: translateY(-2px); }
        .question-card {
            background: white;
            border-left: 4px solid #3498db;
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 20px;
        }
        .question-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .question-type {
            display: inline-block;
            padding: 4px 10px;
            background: #3498db;
            color: white;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-bottom: 10px;
        }
        .options { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .option-btn {
            padding: 12px 20px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        .option-btn:hover { border-color: #3498db; background: #e3f2fd; }
        .option-btn.selected { border-color: #3498db; background: #bbdefb; }
        .option-btn.correct { border-color: #27ae60; background: #c8e6c9; }
        .option-btn.wrong { border-color: #e74c3c; background: #ffcdd2; }
        .answer-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1rem;
            margin: 10px 0;
        }
        .submit-btn {
            margin-top: 15px;
            padding: 10px 25px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .result {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        .result.correct { background: #c8e6c9; color: #2e7d32; }
        .result.wrong { background: #ffcdd2; color: #c62828; }
        .score-card {
            text-align: center;
            padding: 30px;
        }
        .score {
            font-size: 4rem;
            font-weight: bold;
            color: #667eea;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .stat-item { text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; }
        .stat-label { color: #7f8c8d; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>诗词智能问答</h1>
            <p>基于知识图谱自动生成题目，检验你的诗词功底</p>
        </div>
        
        <div class="nav-bar">
            <a href="/" class="nav-btn">返回首页</a>
            <a href="wrong-answers.html" class="nav-btn">我的错题</a>
        </div>

        <div id="quizSetup" class="card">
            <h3>答题设置</h3>
            <div class="quiz-settings">
                <label>题目数量：</label>
                <input type="number" id="questionCount" value="10" min="5" max="20">
                <label>题目类型：</label>
                <select id="questionType">
                    <option value="">混合题型</option>
                    <option value="choice">选择题</option>
                    <option value="fill">填空题</option>
                    <option value="judge">判断题</option>
                </select>
                <button class="btn-primary" onclick="startQuiz()">开始答题</button>
            </div>
        </div>

        <div id="quizArea" class="hidden">
            <div id="questionsList"></div>
            <div class="card score-card hidden" id="scoreCard">
                <h3>答题结果</h3>
                <div class="score" id="finalScore">0</div>
                <p>分</p>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="correctCount">0</div>
                        <div class="stat-label">正确</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="wrongCount">0</div>
                        <div class="stat-label">错误</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalQuestions">0</div>
                        <div class="stat-label">总题数</div>
                    </div>
                </div>
                <button class="btn-primary" style="margin-top: 20px;" onclick="location.reload()">再来一次</button>
            </div>
        </div>
    </div>

    <script>
        let questions = [];
        let answers = {};
        let currentQuestion = 0;

        async function startQuiz() {
            const count = document.getElementById('questionCount').value;
            const type = document.getElementById('questionType').value;
            
            try {
                const res = await fetch('/api/quiz/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ count: parseInt(count), type })
                });
                const json = await res.json();
                
                if (json.success) {
                    questions = json.data;
                    document.getElementById('quizSetup').classList.add('hidden');
                    document.getElementById('quizArea').classList.remove('hidden');
                    renderQuestions();
                } else {
                    if (json.message && json.message.includes('登录')) {
                        window.location.href = '/login';
                    } else {
                        alert(json.message);
                    }
                }
            } catch (e) {
                alert('网络错误');
            }
        }

        function renderQuestions() {
            const container = document.getElementById('questionsList');
            container.innerHTML = '';
            
            questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = 'question-' + index;
                
                let typeLabel = q.questionType === 'choice' ? '选择题' : 
                               q.questionType === 'fill' ? '填空题' : '判断题';
                
                card.innerHTML = `
                    <span class="question-type">${typeLabel}</span>
                    <div class="question-title">第${index + 1}题：${q.question}</div>
                    <div class="question-meta">知识点：${q.knowledgePoint} | 诗词：《${q.relatedPoem}》</div>
                    ${renderInput(q, index)}
                    <button class="submit-btn" onclick="submitAnswer(${index})">提交答案</button>
                    <div class="result" id="result-${index}"></div>
                `;
                container.appendChild(card);
            });
        }

        function renderInput(question, index) {
            if (question.questionType === 'choice' || question.questionType === 'judge') {
                const options = question.options.split(',');
                let html = '<div class="options">';
                options.forEach(opt => {
                    html += `<button class="option-btn" onclick="selectOption(${index}, '${opt}', this)">${opt}</button>`;
                });
                html += '</div>';
                return html;
            } else {
                return `<input type="text" class="answer-input" id="answer-${index}" placeholder="请输入答案">`;
            }
        }

        function selectOption(index, answer, btn) {
            answers[index] = answer;
            const card = document.getElementById('question-' + index);
            card.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        async function submitAnswer(index) {
            const question = questions[index];
            let userAnswer = '';
            
            if (question.questionType === 'choice' || question.questionType === 'judge') {
                userAnswer = answers[index] || '';
            } else {
                userAnswer = document.getElementById('answer-' + index).value.trim();
            }
            
            if (!userAnswer) {
                alert('请先选择或输入答案');
                return;
            }
            
            try {
                const res = await fetch('/api/quiz/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        questionId: question.id,
                        userAnswer: userAnswer
                    })
                });
                const json = await res.json();
                
                const resultDiv = document.getElementById('result-' + index);
                resultDiv.style.display = 'block';
                resultDiv.className = 'result ' + (json.correct ? 'correct' : 'wrong');
                resultDiv.innerHTML = json.correct ? 
                    '✓ 回答正确！' : 
                    `✗ 回答错误。正确答案：${json.correctAnswer}<br>已加入错题集`;
                
                if (question.questionType === 'choice' || question.questionType === 'judge') {
                    document.querySelectorAll('#question-' + index + ' .option-btn').forEach(btn => {
                        btn.disabled = true;
                        if (btn.textContent === question.answer) {
                            btn.classList.add('correct');
                        } else if (btn.classList.contains('selected') && !json.correct) {
                            btn.classList.add('wrong');
                        }
                    });
                }
                
                document.querySelector('#question-' + index + ' .submit-btn').disabled = true;
                
                updateScore();
            } catch (e) {
                alert('提交失败');
            }
        }

        function updateScore() {
            const results = document.querySelectorAll('.result');
            let correct = 0, wrong = 0;
            
            results.forEach(r => {
                if (r.classList.contains('correct')) correct++;
                if (r.classList.contains('wrong')) wrong++;
            });
            
            const total = questions.length;
            const score = Math.round((correct / total) * 100);
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('correctCount').textContent = correct;
            document.getElementById('wrongCount').textContent = wrong;
            document.getElementById('totalQuestions').textContent = total;
            
            if (correct + wrong === total) {
                document.getElementById('scoreCard').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
