<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的错题集 - 诗韵雅集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; padding: 30px 0; color: #2c3e50; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { color: #7f8c8d; }
        .nav-bar { display: flex; justify-content: center; gap: 1rem; margin-bottom: 30px; }
        .nav-btn {
            padding: 10px 20px; background: white; border: 2px solid #3498db;
            color: #3498db; border-radius: 8px; cursor: pointer; text-decoration: none; transition: all 0.2s;
        }
        .nav-btn:hover, .nav-btn.active { background: #3498db; color: white; }
        .stats-card {
            background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 25px; margin-bottom: 25px;
        }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; }
        .stat-item { text-align: center; padding: 20px; background: #f8f9fa; border-radius: 8px; }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: #667eea; }
        .stat-label { color: #7f8c8d; margin-top: 5px; }
        .wrong-list { display: flex; flex-direction: column; gap: 15px; }
        .wrong-card {
            background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 25px; border-left: 4px solid #e74c3c;
        }
        .wrong-question { font-size: 1.1rem; color: #2c3e50; margin-bottom: 10px; }
        .wrong-meta { display: flex; gap: 15px; color: #7f8c8d; margin-bottom: 15px; font-size: 0.9rem; }
        .answer-comparison { display: flex; gap: 20px; margin-top: 15px; }
        .user-answer, .correct-answer { flex: 1; padding: 12px; border-radius: 8px; }
        .user-answer { background: #ffcdd2; color: #c62828; }
        .correct-answer { background: #c8e6c9; color: #2e7d32; }
        .answer-label { font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; }
        .btn-remove {
            padding: 8px 16px; background: #3498db; color: white; border: none;
            border-radius: 6px; cursor: pointer; margin-top: 15px; transition: background 0.2s;
        }
        .btn-remove:hover { background: #2980b9; }
        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-state .icon { font-size: 4rem; color: #bdc3c7; }
        .empty-state h3 { margin-top: 20px; color: #7f8c8d; }
        .knowledge-tag { display: inline-block; padding: 4px 10px; background: #e3f2fd; color: #1976d2; border-radius: 4px; font-size: 0.85rem; margin-top: 10px; }
        .high-freq { border-left-color: #e74c3c; background: #ffebee; }
        .freq-badge { display: inline-block; padding: 2px 8px; background: #e74c3c; color: white; border-radius: 10px; font-size: 0.75rem; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>我的错题集</h1>
            <p>记录错误，温故知新</p>
        </div>
        
        <div class="nav-bar">
            <a href="/" class="nav-btn">返回首页</a>
            <a href="quiz.html" class="nav-btn">开始答题</a>
        </div>

        <div class="stats-card">
            <h3 style="margin-bottom: 20px;">错题统计</h3>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="totalWrong">0</div>
                    <div class="stat-label">错题总数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="highFreqWrong">0</div>
                    <div class="stat-label">高频错题</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="knowledgePoints">0</div>
                    <div class="stat-label">涉及知识点</div>
                </div>
            </div>
        </div>

        <div id="wrongList" class="wrong-list">
            <div class="empty-state">
                <div class="icon">📝</div>
                <h3>暂无错题</h3>
                <p>开始答题来检验你的诗词功底吧！</p>
            </div>
        </div>
    </div>

    <script>
        async function loadWrongAnswers() {
            try {
                const res = await fetch('/api/quiz/wrongAnswers');
                const json = await res.json();
                
                if (!json.success) {
                    if (json.message && json.message.includes('登录')) {
                        window.location.href = '/login';
                    }
                    return;
                }

                const wrongAnswers = json.data;
                document.getElementById('totalWrong').textContent = wrongAnswers.length;
                
                // 加载统计
                const statsRes = await fetch('/api/quiz/stats');
                const statsJson = await statsRes.json();
                if (statsJson.success) {
                    document.getElementById('highFreqWrong').textContent = statsJson.data.highFreqWrong || 0;
                    document.getElementById('knowledgePoints').textContent = Object.keys(statsJson.data.knowledgePointStats || {}).length;
                }
                
                if (wrongAnswers.length === 0) return;
                
                const container = document.getElementById('wrongList');
                container.innerHTML = '';
                
                wrongAnswers.forEach(wa => {
                    const card = document.createElement('div');
                    card.className = 'wrong-card' + (wa.wrongCount >= 3 ? ' high-freq' : '');
                    card.innerHTML = `
                        <div class="wrong-question">
                            ${wa.question}
                            ${wa.wrongCount >= 3 ? '<span class="freq-badge">错' + wa.wrongCount + '次</span>' : ''}
                        </div>
                        <div class="wrong-meta">
                            <span>知识点：${wa.knowledgePoint}</span>
                            <span>诗词：《${wa.relatedPoem}》</span>
                            <span>最后错误：${formatDate(wa.lastWrongTime)}</span>
                        </div>
                        <div class="answer-comparison">
                            <div class="user-answer">
                                <div class="answer-label">你的答案</div>
                                <div>${wa.userAnswer || '未作答'}</div>
                            </div>
                            <div class="correct-answer">
                                <div class="answer-label">正确答案</div>
                                <div>${wa.correctAnswer}</div>
                            </div>
                        </div>
                        <button class="btn-remove" onclick="removeWrong(${wa.id})">已掌握，移除</button>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                console.error('加载失败', e);
            }
        }

        async function removeWrong(id) {
            try {
                await fetch('/api/quiz/wrongAnswers/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });
                loadWrongAnswers();
            } catch (e) {
                alert('移除失败');
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleDateString('zh-CN');
        }

        loadWrongAnswers();
    </script>
</body>
</html>
